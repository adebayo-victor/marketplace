<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit {{ product.name }} // Marketplace</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap');
        :root { --brand: #8d5b3e; --dark: #2d1e14; --bg: #fdfcfb; }
        
        body { background: var(--bg); font-family: 'Georgia', serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .form-card { background: white; padding: 50px; width: 100%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); border-top: 6px solid var(--dark); }
        
        h2 { font-family: 'Montserrat'; text-transform: lowercase; font-size: 1.8rem; margin-bottom: 30px; letter-spacing: -1px; }
        
        .field { margin-bottom: 25px; }
        label { display: block; font-family: 'Montserrat'; font-size: 0.7rem; text-transform: uppercase; color: #888; margin-bottom: 8px; }
        
        input { width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid #eee; font-family: 'Georgia'; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-bottom-color: var(--brand); }

        .row { display: flex; gap: 20px; }
        .row .field { flex: 1; }

        .btn-submit { width: 100%; padding: 20px; background: var(--dark); color: white; border: none; font-family: 'Montserrat'; font-weight: 600; cursor: pointer; margin-top: 20px; letter-spacing: 2px; }
        .back-link { display: block; text-align: center; margin-top: 25px; font-size: 0.8rem; color: #aaa; text-decoration: none; }
    </style>
</head>
<body>

    <div class="form-card">
        <h2>Refine {{ product.name }}.</h2>
        
        <form action="/{{ product.kiosk_slug }}/product/edit/{{ product.id }}" method="POST">
            <div class="field">
                <label>Product Name</label>
                <input type="text" name="name" value="{{ product.name }}" required>
            </div>

            <div class="row">
                <div class="field">
                    <label>Price ($)</label>
                    <input type="number" step="0.01" name="price" value="{{ product.price }}" required>
                </div>
                <div class="field">
                    <label>In Stock</label>
                    <input type="number" name="stock" value="{{ product.stock }}" required>
                </div>
            </div>

            <div class="field">
                <label>Image URL</label>
                <input type="url" name="image_url" value="{{ product.image_url }}">
            </div>

            <button type="submit" class="btn-submit">UPDATE PRODUCT</button>
        </form>

        <a href="/{{ product.kiosk_slug }}/manage" class="back-link">&larr; Cancel and return</a>
    </div>

</body>
</html>
