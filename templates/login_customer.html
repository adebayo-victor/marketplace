<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Access | Marketplace</title>
    <style>
        :root { --accent: #000000; --bg: #ffffff; }
        body { font-family: 'Helvetica Neue', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .login-box { width: 85%; max-width: 350px; text-align: center; }
        h2 { font-size: 2.2rem; letter-spacing: -2px; margin-bottom: 10px; text-transform: uppercase; }
        p { font-size: 0.9rem; color: #666; margin-bottom: 30px; }
        
        input { 
            width: 100%; 
            padding: 16px; 
            border: 1px solid #ddd; 
            border-radius: 50px; /* Rounder, friendlier look for buyers */
            box-sizing: border-box; 
            font-size: 1rem;
            text-align: center;
            margin-bottom: 20px;
        }
        
        input:focus { border-color: var(--accent); outline: none; }

        .btn-access { 
            width: 100%; 
            padding: 16px; 
            background: var(--accent); 
            color: white; 
            border: none; 
            border-radius: 50px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1rem;
        }
        
        .footer-link { display: block; margin-top: 30px; font-size: 0.85rem; color: #999; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Welcome back.</h2>
        <p>Enter your WhatsApp number to view your orders and favorite shops.</p>
        
        <form action="/login/customer" method="POST">
            <input type="tel" name="whatsapp" placeholder="e.g. 08012345678" required>
            <button type="submit" class="btn-access">Access Marketplace</button>
        </form>

        <a href="/login-choice" class="footer-link">← Switch to Merchant Portal</a>
    </div>

</body>
</html>
