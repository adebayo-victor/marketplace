<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Marketplace | Customer</title>
    <style>
        :root { --accent: #000000; --bg: #ffffff; --input-bg: #f9f9f9; }
        body { font-family: 'Helvetica Neue', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .reg-container { width: 90%; max-width: 400px; padding: 40px; border: 1px solid #eee; border-radius: 8px; }
        h2 { font-size: 2rem; letter-spacing: -1px; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            background: var(--input-bg); 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 1rem;
        }
        
        input:focus { border-color: var(--accent); outline: none; }

        .btn-submit { 
            width: 100%; 
            padding: 15px; 
            background: var(--accent); 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px;
        }
        .btn-submit:hover { opacity: 0.8; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="reg-container">
        <h2>Join the Market.</h2>
        <form action="/register/customer" method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>
            
            <div class="form-group">
                <label>WhatsApp Number</label>
                <input type="tel" name="whatsapp" placeholder="08012345678" required>
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="john@campus.edu">
            </div>

            <button type="submit" class="btn-submit">Create Account</button>
        </form>
        <a href="/" class="back-link">← Back to Home</a>
    </div>

</body>
</html>
