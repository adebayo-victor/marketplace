<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway | Vicade Commerce</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0a0a0a;
            --accent-primary: #ff3e00;
            --accent-secondary: #7000ff;
            --text-high: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg); 
            color: var(--text-high); 
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Split Layout */
        .choice-half { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            padding: 60px; 
            position: relative;
            text-decoration: none;
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            border-right: 1px solid var(--glass-border);
        }

        .choice-half:last-child { border-right: none; }

        /* Background Hover Effects */
        .bg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.1;
            filter: grayscale(1) contrast(1.2);
            transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 0;
        }

        .buyer-side .bg-overlay {
            background-image: url('https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a?auto=format&fit=crop&q=80&w=1000');
        }

        .merchant-side .bg-overlay {
            background-image: url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&q=80&w=1000');
        }

        .choice-half:hover .bg-overlay {
            opacity: 0.4;
            transform: scale(1.05);
            filter: grayscale(0) contrast(1);
        }

        /* Content Styling */
        .content { position: relative; z-index: 2; }

        .label {
            font-size: 0.7rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 900;
            margin-bottom: 20px;
            display: block;
            color: var(--text-high);
            opacity: 0.6;
        }

        h2 { 
            font-family: 'Syne', sans-serif; 
            font-size: clamp(3rem, 8vw, 6rem); 
            letter-spacing: -3px; 
            margin: 0; 
            text-transform: uppercase;
            line-height: 0.9;
        }

        p { 
            font-size: 1rem; 
            color: #888; 
            margin: 20px auto 40px; 
            max-width: 280px; 
            font-weight: 300;
        }

        .btn-outline { 
            padding: 20px 40px; 
            border: 1px solid #fff; 
            background: transparent; 
            color: #fff;
            font-weight: 900; 
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.4s;
        }

        /* Specific Accents */
        .buyer-side:hover h2 { color: var(--accent-secondary); }
        .buyer-side:hover .btn-outline { background: var(--accent-secondary); border-color: var(--accent-secondary); }

        .merchant-side:hover h2 { color: var(--accent-primary); }
        .merchant-side:hover .btn-outline { background: var(--accent-primary); border-color: var(--accent-primary); }

        /* Logo Overlay */
        .logo-mark {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            z-index: 10;
            letter-spacing: -1px;
        }

        @media (max-width: 768px) { 
            body { flex-direction: column; overflow-y: auto; }
            .choice-half { width: 100%; height: 50vh; border-right: none; border-bottom: 1px solid var(--glass-border); }
        }
    </style>
</head>
<body>

    <div class="logo-mark">VICADE.</div>

    <a href="/login/customer" class="choice-half buyer-side">
        <div class="bg-overlay"></div>
        <div class="content">
            <span class="label">Procurement</span>
            <h2>BUYER.</h2>
            <p>Navigate the elite marketplace, track orders, and secure assets.</p>
            <div class="btn-outline">Initialize Entry</div>
        </div>
    </a>

    <a href="/login/merchant" class="choice-half merchant-side">
        <div class="bg-overlay"></div>
        <div class="content">
            <span class="label">Operations</span>
            <h2>MERCHANT.</h2>
            <p>Access terminal dashboard, manage logistics, and monitor revenue.</p>
            <div class="btn-outline">Open Portal</div>
        </div>
    </a>

</body>
</html>
