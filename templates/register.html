<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marketplace // Recommendation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap');
        :root { --clay: #8d5b3e; --cream: #f9f5f0; --dark-oak: #2d1e14; }
        
        body { background: var(--cream); color: var(--dark-oak); font-family: 'Georgia', serif; margin: 0; }
        
        .nav-bar {
            background: white; padding: 20px 5%; display: flex; 
            justify-content: space-between; align-items: center;
            border-bottom: 1px solid #eee;
        }

        .container { padding: 60px 5%; max-width: 600px; margin: 0 auto; }

        .welcome-header { margin-bottom: 50px; text-align: center; }
        .welcome-header h1 { 
            font-family: 'Montserrat'; font-size: 2.5rem; text-transform: lowercase; 
            margin: 0; letter-spacing: -1px; 
        }

        .kiosk-card {
            background: white; padding: 40px; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border-top: 5px solid var(--clay);
        }

        label { 
            display: block; font-family: 'Montserrat'; font-size: 0.6rem; 
            text-transform: uppercase; letter-spacing: 1px; color: var(--clay); 
            margin-bottom: 10px; font-weight: 600;
        }
        
        input, select {
            width: 100%; padding: 15px; border: 1px solid #eee; 
            font-family: 'Montserrat'; font-size: 0.8rem; margin-bottom: 25px;
            box-sizing: border-box; background: white;
        }

        #search-results {
            border: 1px solid #eee; background: white; 
            position: absolute; width: 100%; z-index: 10;
            max-height: 150px; overflow-y: auto; display: none;
            margin-top: -25px;
        }
        
        .result-item {
            padding: 12px; font-family: 'Montserrat'; font-size: 0.75rem;
            cursor: pointer; border-bottom: 1px solid #f9f9f9;
        }
        .result-item:hover { background: var(--cream); color: var(--clay); }

        .btn-add-kiosk {
            display: block; width: 100%; background: var(--dark-oak); color: white;
            padding: 18px; text-decoration: none; font-family: 'Montserrat';
            font-weight: 600; font-size: 0.8rem; border: none; cursor: pointer;
            text-align: center; letter-spacing: 1px; transition: 0.3s;
        }
        .btn-add-kiosk:hover { background: var(--clay); }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div style="font-family: 'Montserrat'; font-weight: 600; letter-spacing: 2px;">MARKETPLACE.</div>
        <a href="/marketplace/forbes" style="font-size: 0.8rem; color: #888; text-decoration: none;">Back</a>
    </div>

    <div class="container">
        <div class="welcome-header">
            <h1>Endorse Merchant.</h1>
            <p style="font-style: italic; opacity: 0.6;">Submit your recommendation to the Forbes Auction.</p>
        </div>

        <div class="kiosk-card">
            <form onsubmit="event.preventDefault(); submitRec();">
                
                <label>Merchant Category</label>
                <select id="category">
                    <option value="Electronics">Electronics</option>
                    <option value="Fashion">Fashion</option>
                    <option value="Food">Food & Drinks</option>
                    <option value="Beauty">Beauty</option>
                    <option value="Services">Services</option>
                </select>

                <label>Find Merchant</label>
                <div style="position: relative;">
                    <input type="text" id="merchantSearch" placeholder="Enter name..." autocomplete="off">
                    <div id="search-results"></div>
                </div>
                <input type="hidden" id="selectedMerchantId">

                <div style="margin: 40px 0; border-top: 1px solid #f4f4f4;"></div>

                <label>Customer Email</label>
                <input type="email" id="email" placeholder="Email address" required>

                <label>Security Key</label>
                <input type="password" id="password" placeholder="Password" required>

                <button type="submit" class="btn-add-kiosk">LOG RECOMMENDATION</button>
            </form>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('merchantSearch');
        const resultsDiv = document.getElementById('search-results');

        searchInput.addEventListener('input', function() {
            const query = this.value;
            if (query.length < 2) {
                resultsDiv.style.display = 'none';
                return;
            }
            // Mock result UI
            resultsDiv.innerHTML = `<div class="result-item" onclick="selectMerchant(1, 'Sample Merchant')">Sample Merchant</div>`;
            resultsDiv.style.display = 'block';
        });

        function selectMerchant(id, name) {
            document.getElementById('selectedMerchantId').value = id;
            searchInput.value = name;
            resultsDiv.style.display = 'none';
        }

        function submitRec() {
            const mId = document.getElementById('selectedMerchantId').value;
            if (!mId) { alert("Select a merchant from the search."); return; }

            const data = new FormData();
            data.append('merchant_id', mId);
            data.append('category', document.getElementById('category').value);
            data.append('email', document.getElementById('email').value);
            data.append('password', document.getElementById('password').value);

            fetch('/recommend', { method: 'POST', body: data })
            .then(res => res.json())
            .then(res => {
                if(res.status === 'success') {
                    window.location.href = '/marketplace/forbes';
                } else {
                    alert('Error: ' + res.message);
                }
            });
        }
    </script>
</body>
</html>
