<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Enrollment // Marketplace</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap');
        
        :root {
            --clay: #8d5b3e; 
            --cream: #f9f5f0; 
            --dark-oak: #2d1e14;
        }

        body {
            background: var(--cream);
            color: var(--dark-oak);
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-container {
            background: white;
            padding: 60px;
            width: 100%;
            max-width: 450px;
            border-top: 8px solid var(--clay);
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
        }

        h2 {
            font-family: 'Montserrat', sans-serif;
            text-transform: lowercase;
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        p.subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 40px;
            font-style: italic;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--clay);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 15px 0;
            border: none;
            border-bottom: 1px solid #ddd;
            font-family: 'Georgia', serif;
            font-size: 1.1rem;
            outline: none;
            background: transparent;
            transition: border-color 0.3s;
        }

        input:focus {
            border-bottom-color: var(--clay);
        }

        .btn-submit {
            margin-top: 20px;
            width: 100%;
            padding: 20px;
            background: var(--dark-oak);
            color: white;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            font-size: 0.8rem;
            color: #888;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>Merchant Enrollment.</h2>
        <p class="subtitle">Join the guild to begin constructing your kiosks.</p>
        
        <form action="/register" method="POST">
            <div class="form-group">
                <label>Merchant / Brand Name</label>
                <input type="text" name="name" placeholder="Your Merchant name" required>
            </div>
            
            <div class="form-group">
                <label>Master WhatsApp Number</label>
                <input type="text" name="phone" placeholder="23480..." required>
            </div>

            <div class="form-group">
                <label>Secret Key (Password)</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="btn-submit">JOIN THE MARKETPLACE</button>
        </form>
        
        <a href="/" class="back-link">&larr; Return to Marketplace</a>
    </div>

</body>
</html>
